<div class="flex w-full gap-6 min-h-70">
  <div class="flex items-center gap-4 w-2/3">
    <label
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave($event)"
      (drop)="onDrop($event)"
      (change)="onFileSelected($event)"
      [class.border-purple-600]="isDragOver"
      [class.border-4]="isDragOver"
      [class.bg-purple-100]="isDragOver"
      for="dropzone-file"
      class="flex flex-col items-center justify-center w-full h-full border-2 border-gray-300 border-dashed rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100"
    >
      <p class="mb-2 text-lg">
        <span class="font-semibold">Click to upload</span> or drag and drop
      </p>
      <p class="text-xs text-gray-500">SVG, PNG, JPG or GIF (MAX. 800x400px)</p>
      <input id="dropzone-file" type="file" class="hidden" />
    </label>
  </div>
  @if (imgSrc()) {
    <div class="flex flex-col gap-3 w-1/3">
      <div class="flex justify-center border-2 border-gray-300 rounded-lg">
        <img
          class="aspect-square object-cover rounded-lg"
          src="{{ imgSrc() }}"
          alt="image preview"
        />
      </div>
      <div class="flex w-full gap-3">
        <button type="button" class="flex-1 btn" (click)="onCancel()">Cancel</button>
        <button
          type="button"
          class="flex-1 btn btn-primary"
          (click)="onUpload()"
          [disabled]="loading()"
        >
          @if (loading()) {
            <span class="loading loading-spinner"></span>
          }
          Upload
        </button>
      </div>
    </div>
  }
</div>
